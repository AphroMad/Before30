<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before 30 — Goaldex</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ds">
        <!-- LED cluster + lang toggle -->
        <div class="ds-top">
            <div class="ds-leds">
                <div class="led led-big"></div>
                <div class="led led-sm red"></div>
                <div class="led led-sm yellow"></div>
                <div class="led led-sm green"></div>
            </div>
            <div class="lang-toggle" id="lang-toggle">
                <button class="lang-btn" data-lang="en"><span class="flag">🇺🇸</span> EN</button>
                <button class="lang-btn active" data-lang="fr"><span class="flag">🇫🇷</span> FR</button>
            </div>
        </div>

        <!-- Screen -->
        <div class="screen-bezel">
            <div class="screen">

                <!-- Red header: title left, completion right -->
                <div class="dex-header">
                    <div class="header-ball"></div>
                    <span id="h-title">BEFORE 30 GOALDEX</span>
                    <div class="header-right">
                        <span class="progress-lbl" id="h-completion">COMPLETION</span>
                        <div class="pbar-track"><div class="pbar-fill" id="pbar"></div></div>
                        <span class="pbar-label" id="pbar-label">0/0</span>
                    </div>
                </div>

                <!-- Deadline bar -->
                <div class="dex-deadline">
                    <span id="h-deadline">DEADLINE: MAY 24, 2030</span>
                    <span id="h-countdown"></span>
                </div>

                <!-- Split: sprite + list -->
                <div class="dex-body">
                    <div class="dex-left">
                        <div class="sprite-box">
                            <div class="hatch"></div>
                            <img id="sprite" src="" alt="">
                        </div>
                        <div class="sprite-label">
                            <span id="s-num">#001</span>
                            <span id="s-name">???</span>
                        </div>
                    </div>

                    <div class="dex-right">
                        <div class="list" id="list">
                            <div class="list-track" id="list-track"></div>
                        </div>
                    </div>
                </div>

                <!-- Detail bar -->
                <div class="dex-detail" id="detail">
                    <div class="detail-text" id="detail-text"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="goals.js"></script>
    <script src="app.js"></script>
</body>
</html>
